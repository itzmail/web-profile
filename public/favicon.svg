<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .bg      { fill: #0a0a0f; }
    .bracket { fill: none; stroke: #00ff88; stroke-width: 7; stroke-linecap: square; }
    .stem    { fill: #ffffff; }
    .dot     { fill: #00d4ff; }
  </style>

  <!-- Background -->
  <rect class="bg" width="128" height="128" rx="16" />

  <!-- [ left bracket -->
  <polyline class="bracket" points="42,22 24,22 24,106 42,106" />
  <!-- ] right bracket -->
  <polyline class="bracket" points="86,22 104,22 104,106 86,106" />

  <!-- i stem (white) -->
  <rect class="stem" x="56" y="58" width="16" height="42" rx="4" />

  <!-- i dot (cyan) -->
  <circle class="dot" cx="64" cy="42" r="10" />
</svg>
